    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'brand-blue': {
                light: '#60A5FA',
                DEFAULT: '#3B82F6',
                dark: '#2563EB',
              },
              'brand-gray': {
                '50': '#F1F2F6',
                '100': '#E6E8EF',
                '200': '#C8CDDA',
                '300': '#A9B1C5',
                '400': '#8B96AF',
                '500': '#6C7A9A',
                '600': '#57627E',
                '700': '#41495D',
                '800': '#2C313D',
                '900': '#16181E',
                '950': '#0B0C0F'
              },
            },
            animation: {
              'spin-slow': 'spin 30s linear infinite',
              'pulse-glow': 'pulse-glow 2.5s infinite ease-in-out',
              'rotate-3d': 'rotate-3d 20s linear infinite',
              'rate-increase-pulse': 'rate-increase-pulse 0.8s ease-in-out',
              'fade-in-out': 'fade-in-out 3s ease-in-out forwards',
              'reward-fly-up': 'reward-fly-up 2s ease-out forwards',
              'reward-text-pop': 'reward-text-pop 2s ease-in-out forwards',
            },
            keyframes: {
              'pulse-glow': {
                '0%, 100%': { boxShadow: '0 0 20px rgba(59, 130, 246, 0.4)' },
                '50%': { boxShadow: '0 0 35px rgba(59, 130, 246, 0.8)' },
              },
              'rotate-3d': {
                '0%': { transform: 'rotateY(0deg) rotateX(5deg)' },
                '50%': { transform: 'rotateY(180deg) rotateX(5deg)' },
                '100%': { transform: 'rotateY(360deg) rotateX(5deg)' },
              },
              'rate-increase-pulse': {
                '0%, 100%': { transform: 'scale(1)', color: 'inherit', textShadow: 'none' },
                '50%': { transform: 'scale(1.05)', color: '#4ade80', textShadow: '0 0 10px #4ade80' },
              },
              'fade-in-out': {
                '0%': { opacity: '0', transform: 'translateY(1rem)' },
                '20%, 80%': { opacity: '1', transform: 'translateY(0)' },
                '100%': { opacity: '0', transform: 'translateY(-1rem)' },
              },
              'reward-fly-up': {
                '0%': { transform: 'translateY(0) scale(0.5)', opacity: '1' },
                '100%': { transform: 'translateY(-100vh) scale(1)', opacity: '0' },
              },
              'reward-text-pop': {
                  '0%': { transform: 'translateY(50px) scale(0.8)', opacity: '0' },
                  '20%': { transform: 'translateY(0) scale(1.2)', opacity: '1' },
                  '80%': { transform: 'translateY(-50px) scale(1)', opacity: '1' },
                  '100%': { transform: 'translateY(-80px) scale(0.8)', opacity: '0' },
              },
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {

    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>
